worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # Rate limiting: 5 requests/minute per IP for API endpoints
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/m;

    server {
        listen 3001;

        # Serve static frontend files
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ =404;
        }

        # Reverse proxy API calls to the backend container (with rate limit)
        location /api/ {
            limit_req zone=api_limit burst=3 nodelay;
            limit_req_status 429;

            proxy_pass http://api:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
