services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - keys.env
    environment:
      - DAILY_REQUEST_LIMIT=50
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "4000:4000"
    depends_on:
      - api
    restart: unless-stopped
